<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Questionario PCTO</title>
    <link rel="stylesheet" href="{{static_url('style.css')}}">
</head>
<body>
    <div class="login-container">
        <h1>Accesso al Questionario PCTO</h1>
        <form id="loginForm" action="/login" method="POST">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Accedi</button>
        </form>
    </div>
    <!--  Prova per una generazione di errori in maniera decente, dal codice
    {% set msg = handler.get_argument("error", None) or globals().get('error_message', None) %}
    {% if error_message %}
        <div class="error-box">
            {{ error_message }}
        </div>
    {% end %}
    -->


    <script src="script.js"></script>
</body>
</html>
