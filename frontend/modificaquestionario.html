<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Questionario - PCTO</title>
    <link rel="stylesheet" href="{{static_url('style.css')}}">
    <style>
        .question-container { max-width: 1000px; margin: 40px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-section { margin-bottom: 30px; padding: 20px; background-color: #f1f8ff; border: 1px solid #cce5ff; border-radius: 5px; }
        .form-section h3 { margin-top: 0; color: #0056b3; }
        .form-section input, .form-section select, .form-section button { margin-bottom: 15px; width: 100%; padding: 10px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
        .btn-add { background-color: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { background-color: #218838; }

        .list-section { max-height: 600px; overflow-y: auto; border: 1px solid #ddd; }
        .question-table { width: 100%; border-collapse: collapse; background: white; }
        .question-table th, .question-table td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        .question-table th { background-color: #007bff; color: white; position: sticky; top: 0; }
        .question-table tr:nth-child(even) { background-color: #f9f9f9; }
        .delete-btn { background-color: #dc3545; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .delete-btn:hover { background-color: #c82333; }
    </style>
</head>
<body>
    <div class="question-container">
        <h2>Gestione Domande Questionario PCTO</h2>
        <p>Aggiungi o rimuovi le domande che compongono il questionario per l'Area Studente.</p>

        <div class="form-section">
            <h3>Aggiungi Nuova Domanda</h3>
            <div id="error-message" style="color: red; margin-bottom: 10px; display: none;"></div>

            <form id="addQuestionForm">
                <label for="testo_domanda">Testo della Domanda:</label>
                <input type="text" id="testo_domanda" name="testo_domanda" placeholder="Es: Come valuti l'organizzazione generale?" required>

                <label for="tipo_risposta">Tipo di Risposta attesa:</label>
                <select id="tipo_risposta" name="tipo_risposta" required>
                    <option value="testo_breve">Testo Breve (Input)</option>
                    <option value="testo_lungo">Testo Lungo (Textarea)</option>
                    <option value="si_no">Scelta: Sì / No (Radio)</option>
                    <option value="scala_valutazione">Scala: Moltissimo -> Poco per nulla</option>
                    <option value="scelta_multipla">Scelta Multipla (Checkbox)</option>
                    <option value="menu_tendina">Menu a tendina (Select)</option>
                </select>

                <label for="testo_opzioni">Possibili risposte (Per scelte multiple/menu a tendina)</label>
                <input type="text" id="testo_opzioni" name="testo_opzioni" placeholder="Scrivi le opzioni separate da un ;">

                <button type="submit" class="btn-add">+ Salva Domanda nel Questionario</button>
            </form>
        </div>

        <h3>Domande Attuali nel Questionario</h3>
        <div class="list-section">
            <table class="question-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Testo Domanda</th>
                        <th>Tipo Risposta</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="questionsTableBody">
                    <!-- JavaScript caricherà le righe dinamicamente qui -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Funzione per caricare le domande dal backend Python
        async function caricaDomande() {
            try {
                const response = await fetch(window.location.href, {
                    method: 'GET',
                    headers: {
                        // Questo indica al Python handler di attivare get_questions()
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Errore server: ${response.status}`);
                }

                const domande = await response.json();
                const tbody = document.getElementById('questionsTableBody');
                tbody.innerHTML = ''; // Svuota la tabella prima di popolarla

                // Cicla l'array strutturato dal tuo codice Python
                domande.forEach((domanda, index) => {
                    const riga = tbody.insertRow(-1);

                    // 1. Colonna Numero Progressivo
                    const cellaId = riga.insertCell(0);
                    cellaId.textContent = index + 1;

                    // 2. Colonna Testo Domanda
                    const cellaTesto = riga.insertCell(1);
                    cellaTesto.textContent = domanda.testo_domanda;
                    cellaTesto.className = "q-text";

                    // 3. Colonna Tipo Risposta
                    const cellaTipo = riga.insertCell(2);
                    cellaTipo.textContent = domanda.tipo_risposta;

                    // 4. Colonna Azioni (Bottone Elimina)
                    const cellaAzioni = riga.insertCell(3);
                    const btnElimina = document.createElement('button');
                    btnElimina.type = 'button';
                    btnElimina.className = 'delete-btn';
                    btnElimina.textContent = 'Elimina';

                    // Listener temporaneo per l'eliminazione visiva
                    btnElimina.onclick = function() {
                        // Qui potrai inserire la fetch con metodo DELETE verso Python
                        riga.remove();
                    };
                    cellaAzioni.appendChild(btnElimina);
                });

            } catch (error) {
                console.error('Errore nel caricamento delle domande:', error);
                const errorDiv = document.getElementById('error-message');
                errorDiv.textContent = 'Impossibile caricare le domande dal server.';
                errorDiv.style.display = 'block';
            }
        }

        // Avvia il caricamento non appena la pagina è pronta
        window.addEventListener('DOMContentLoaded', caricaDomande);
    </script>
</body>
</html>
